name: 🚀 Microservices Chat App CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # Job 1: Install & Run Backend / Frontend Tests
  test:
    name: 🧪 Run Tests and Linting
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: |
            gateway/package-lock.json
            services/auth-service/package-lock.json
            services/chat-service/package-lock.json
            services/notification-service/package-lock.json
            client/package-lock.json

      # Install & Test Auth Service (using MongoDB Memory Server or mock env)
      - name: 🔒 Install & Test Auth Service
        run: |
          cd services/auth-service
          npm ci
          # We can run mock tests (using our written jest suite)
          # Set NODE_ENV to test to skip DB connection in index.js and use mock/test DB
          MONGO_URI_TEST=mongodb://localhost:27017/test_db npm run test

      # Install & Test Chat Service
      - name: 💬 Install & Validate Chat Service
        run: |
          cd services/chat-service
          npm ci

      # Install & Test Notification Service
      - name: 🔔 Install & Validate Notification Service
        run: |
          cd services/notification-service
          npm ci

      # Install & Test Client
      - name: 🎨 Install & Build Client
        run: |
          cd client
          npm ci
          npm run build

  # Job 2: Build & Push Docker Images Concurrently via Matrix Strategy
  build-and-push:
    name: 🐳 Build & Publish Docker Images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: 
          - name: gateway
            path: ./gateway
            image: micro-chat-gateway
          - name: auth-service
            path: ./services/auth-service
            image: micro-chat-auth-service
          - name: chat-service
            path: ./services/chat-service
            image: micro-chat-chat-service
          - name: notification-service
            path: ./services/notification-service
            image: micro-chat-notification-service
          - name: client
            path: ./client
            image: micro-chat-client

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push with cache to make builds extremely fast
      - name: 📦 Build and Push Matrix Images
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.path }}
          file: ${{ matrix.service.path }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max